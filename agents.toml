# Agent configuration — defaults apply to all agents unless overridden per-agent.

[api]
prefix = "/api"                 # API path prefix (e.g. "/api" for /api/tasks, /api/journal, etc.)

[dispatch]
short_break = 30            # seconds between normal iterations
long_break =  7200          # seconds for extended breaks
long_break_every = 4        # take a long break every N iterations
max_workers = 4             # parallel agent slots
retry_delays = [60, 300, 600, 1000]
retry_max_attempts = 6
oom_delays = [300, 600]
oom_max_attempts = 4

# --- Divisions ---

[[divisions]]
name = "cancer"
description = "Cancer research and drug discovery"

[[divisions]]
name = "crohns"
description = "Crohn's disease research"

[[divisions]]
name = "tourettes"
description = "Tourette syndrome research"

[[divisions]]
name = "pandas_pans"
description = "PANDAS/PANS autoimmune neuropsychiatric research"

[[divisions]]
name = "diagnostics"
description = "Making medical diagnosis more accurate, accessible, and affordable"

[defaults]
backend = "claude"
model = "claude-opus-4-6"
effort = "high"
division = "cancer"

# --- Cancer: Generators (always run, create work for others) ---

[[agents]]
role = "RESEARCH_DIRECTOR"
division = "cancer"
effort = "max"

[[agents]]
role = "LITERATURE_REVIEWER"
division = "cancer"

[[agents]]
role = "DATA_CURATOR"
division = "cancer"

[[agents]]
role = "SYSTEMS_ENGINEER"
division = "cancer"
effort = "max"

# --- Cancer: Task-driven agents (run when they have tasks) ---

[[agents]]
role = "PROJECT_MANAGER"
division = "cancer"

[[agents]]
role = "DEVELOPER"
division = "cancer"
effort = "max"

[[agents]]
role = "ANALYST"
division = "cancer"
effort = "max"

[[agents]]
role = "VALIDATION_SCIENTIST"
division = "cancer"
effort = "max"

[[agents]]
role = "RESEARCH_WRITER"
division = "cancer"

# --- Crohn's: Generators ---

[[agents]]
role = "RESEARCH_DIRECTOR"
division = "crohns"
effort = "max"

[[agents]]
role = "LITERATURE_REVIEWER"
division = "crohns"

# --- Tourette's: Generators ---

[[agents]]
role = "RESEARCH_DIRECTOR"
division = "tourettes"
effort = "max"

[[agents]]
role = "LITERATURE_REVIEWER"
division = "tourettes"

# --- PANDAS/PANS: Generators ---

[[agents]]
role = "RESEARCH_DIRECTOR"
division = "pandas_pans"
effort = "max"

[[agents]]
